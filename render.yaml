services:
  - type: web
    name: iubel-erp-elite
    env: node
    plan: starter
    buildCommand: npm install && npm run db:schema && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        placeholder: "mysql://user:password@host:port/database"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
