# Iubel ERP — Production Orchestration
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=iubel_admin
      - DB_PASS=iubel_secret_password
      - DB_NAME=iubel_erp
    depends_on:
      - db
    networks:
      - iubel-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - iubel-net

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=iubel_erp
      - MYSQL_USER=iubel_admin
      - MYSQL_PASSWORD=iubel_secret_password
      - MYSQL_ROOT_PASSWORD=root_secret_password
    volumes:
      - iubel-db-data:/var/lib/mysql
    networks:
      - iubel-net

networks:
  iubel-net:
    driver: bridge

volumes:
  iubel-db-data:
